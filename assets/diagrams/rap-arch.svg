<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="'Ubuntu', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E95420"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="55" fill="#E95420"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">RAP Architecture — Full Stack Breakdown</text>

  <!-- ============ LAYER 1: UI ============ -->
  <rect x="40" y="70" width="920" height="55" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="65" y="93" font-size="14" font-weight="bold" fill="#16A34A">1. UI / Presentation Layer</text>
  <text x="65" y="113" font-size="10" fill="#1e293b">SAP Fiori Elements · Freestyle UI5 · OData V4 Client · Web APIs</text>

  <line x1="65" y1="125" x2="65" y2="155" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>
  <text x="85" y="145" font-size="9" fill="#E95420">OData V4 Request</text>

  <!-- ============ LAYER 2: Service ============ -->
  <rect x="40" y="160" width="920" height="60" rx="8" fill="#E0F2FE" stroke="#3B82F6" stroke-width="2"/>
  <text x="65" y="183" font-size="14" font-weight="bold" fill="#2563EB">2. Service Layer</text>
  <text x="65" y="200" font-size="10" fill="#1e293b">Service Definition → defines what entities are exposed</text>
  <text x="65" y="215" font-size="9" fill="#64748B">Service Binding → binds to OData V4 UI or Web API protocol</text>

  <line x1="65" y1="220" x2="65" y2="250" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>
  <text x="85" y="240" font-size="9" fill="#E95420">EML (Entity Manipulation Language)</text>

  <!-- ============ LAYER 3: Behavior ============ -->
  <rect x="40" y="255" width="920" height="85" rx="8" fill="#FEFCE8" stroke="#EAB308" stroke-width="2"/>
  <text x="65" y="278" font-size="14" font-weight="bold" fill="#CA8A04">3. Behavior Layer</text>

  <!-- Behavior operation boxes -->
  <rect x="65" y="290" width="200" height="40" rx="4" fill="#FEF9C3" stroke="#EAB308" stroke-width="1"/>
  <text x="165" y="308" text-anchor="middle" font-size="10" fill="#854D0E">Behavior Definition (BDEF)</text>
  <text x="165" y="322" text-anchor="middle" font-size="8" fill="#64748B">create / update / delete</text>

  <rect x="285" y="290" width="200" height="40" rx="4" fill="#FEF9C3" stroke="#EAB308" stroke-width="1"/>
  <text x="385" y="308" text-anchor="middle" font-size="10" fill="#854D0E">Behavior Implementation</text>
  <text x="385" y="322" text-anchor="middle" font-size="8" fill="#64748B">ABAP class (local)</text>

  <rect x="505" y="290" width="200" height="40" rx="4" fill="#FEF9C3" stroke="#EAB308" stroke-width="1"/>
  <text x="605" y="308" text-anchor="middle" font-size="10" fill="#854D0E">Draft Handling</text>
  <text x="605" y="322" text-anchor="middle" font-size="8" fill="#64748B">Draft tables (if active)</text>

  <rect x="725" y="290" width="200" height="40" rx="4" fill="#FEF9C3" stroke="#EAB308" stroke-width="1"/>
  <text x="825" y="308" text-anchor="middle" font-size="10" fill="#854D0E">Authorization Control</text>
  <text x="825" y="322" text-anchor="middle" font-size="8" fill="#64748B">%control / instance auth</text>

  <line x1="65" y1="340" x2="65" y2="370" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>
  <text x="85" y="360" font-size="9" fill="#E95420">reads from</text>

  <!-- ============ LAYER 4: Data Model ============ -->
  <rect x="40" y="375" width="920" height="85" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="65" y="398" font-size="14" font-weight="bold" fill="#DC2626">4. Data Model Layer</text>

  <rect x="65" y="410" width="220" height="40" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="175" y="428" text-anchor="middle" font-size="10" fill="#991B1B">CDS View Entity (Root)</text>
  <text x="175" y="442" text-anchor="middle" font-size="8" fill="#64748B">define root view entity</text>

  <rect x="305" y="410" width="220" height="40" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="415" y="428" text-anchor="middle" font-size="10" fill="#991B1B">CDS Projection View</text>
  <text x="415" y="442" text-anchor="middle" font-size="8" fill="#64748B">define root view entity (projection)</text>

  <rect x="545" y="410" width="220" height="40" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="655" y="428" text-anchor="middle" font-size="10" fill="#991B1B">Metadata Extension</text>
  <text x="655" y="442" text-anchor="middle" font-size="8" fill="#64748B">@MetadataExtension: true</text>

  <rect x="785" y="410" width="140" height="40" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="855" y="428" text-anchor="middle" font-size="10" fill="#991B1B">RAP BO</text>
  <text x="855" y="442" text-anchor="middle" font-size="8" fill="#64748B">Business Object</text>

  <line x1="65" y1="460" x2="65" y2="490" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ LAYER 5: Database ============ -->
  <rect x="40" y="495" width="920" height="55" rx="8" fill="#EDE9FE" stroke="#A855F7" stroke-width="2"/>
  <text x="65" y="518" font-size="14" font-weight="bold" fill="#9333EA">5. Database Layer</text>
  <text x="65" y="538" font-size="10" fill="#1e293b">SAP HANA · DDIC Tables · Table Functions · AMDP · ABAP SQL via Open SQL</text>

  <line x1="65" y1="550" x2="65" y2="580" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ FULL REQUEST FLOW ============ -->
  <rect x="40" y="585" width="920" height="200" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="500" y="610" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">RAP Request Flow — End to End</text>
  <line x1="60" y1="618" x2="940" y2="618" stroke="#E2E8F0" stroke-width="1"/>

  <text x="80" y="642" font-size="10" font-weight="bold" fill="#64748B">Step</text>
  <text x="200" y="642" font-size="10" font-weight="bold" fill="#64748B">Component</text>
  <text x="450" y="642" font-size="10" font-weight="bold" fill="#64748B">What Happens</text>
  <line x1="80" y1="648" x2="900" y2="648" stroke="#E2E8F0" stroke-width="1"/>

  <text x="80" y="668" font-size="10" font-weight="bold" fill="#22C55E">1</text>
  <text x="200" y="668" font-size="10" fill="#1e293b">Fiori / UI5</text>
  <text x="450" y="668" font-size="10" fill="#1e293b">User triggers a request (list report, object page, action)</text>

  <text x="80" y="688" font-size="10" font-weight="bold" fill="#22C55E">2</text>
  <text x="200" y="688" font-size="10" fill="#1e293b">Service Binding</text>
  <text x="450" y="688" font-size="10" fill="#1e293b">OData V4 URL → maps to Service Definition entities</text>

  <text x="80" y="708" font-size="10" font-weight="bold" fill="#EAB308">3</text>
  <text x="200" y="708" font-size="10" fill="#1e293b">Behavior Definition</text>
  <text x="450" y="708" font-size="10" fill="#1e293b">EML → routes to create/update/delete or query implementation</text>

  <text x="80" y="728" font-size="10" font-weight="bold" fill="#EAB308">4</text>
  <text x="200" y="728" font-size="10" fill="#1e293b">Behavior Implementation</text>
  <text x="450" y="728" font-size="10" fill="#1e293b">ABAP class: FOR MODIFY / FOR READ methods execute logic</text>

  <text x="80" y="748" font-size="10" font-weight="bold" fill="#EF4444">5</text>
  <text x="200" y="748" font-size="10" fill="#1e293b">CDS View Entity</text>
  <text x="450" y="748" font-size="10" fill="#1e293b">SQL statement generated from CDS → Open SQL → HANA</text>

  <text x="80" y="768" font-size="10" font-weight="bold" fill="#A855F7">6</text>
  <text x="200" y="768" font-size="10" fill="#1e293b">SAP HANA</text>
  <text x="450" y="768" font-size="10" fill="#1e293b">Data returned to EML → serialized to OData V4 JSON → Fiori</text>
</svg>

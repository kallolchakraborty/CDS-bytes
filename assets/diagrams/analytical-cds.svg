<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Ubuntu', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E95420"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="55" fill="#E95420"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">Analytical CDS — Cube · Dimension · Query</text>

  <!-- ============ FLOW: Data → Cube → Query ============ -->
  <text x="500" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Analytical CDS Architecture</text>

  <!-- Data Source -->
  <rect x="40" y="95" width="920" height="40" rx="6" fill="#1E293B"/>
  <text x="500" y="119" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF">Data Source Layer</text>
  <text x="500" y="132" text-anchor="middle" font-size="9" fill="#94A3B8">CDS Basic / Interface Views (I_* or direct DDIC tables)</text>

  <line x1="500" y1="135" x2="500" y2="160" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Cube -->
  <rect x="40" y="165" width="400" height="60" rx="8" fill="#FEFCE8" stroke="#EAB308" stroke-width="2"/>
  <text x="240" y="188" text-anchor="middle" font-size="14" font-weight="bold" fill="#CA8A04">Cube View</text>
  <text x="240" y="205" text-anchor="middle" font-size="10" fill="#1e293b">@Analytics.dataCategory: #CUBE</text>
  <text x="240" y="220" text-anchor="middle" font-size="9" fill="#64748B">Transactional data (facts) + measures</text>

  <!-- Dimension -->
  <rect x="480" y="165" width="480" height="60" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="720" y="188" text-anchor="middle" font-size="14" font-weight="bold" fill="#16A34A">Dimension View</text>
  <text x="720" y="205" text-anchor="middle" font-size="10" fill="#1e293b">@Analytics.dataCategory: #DIMENSION</text>
  <text x="720" y="220" text-anchor="middle" font-size="9" fill="#64748B">Master data / attributes for grouping &amp; filtering</text>

  <line x1="240" y1="225" x2="240" y2="250" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="720" y1="225" x2="720" y2="250" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Analytical Projection / Query -->
  <rect x="120" y="255" width="760" height="50" rx="8" fill="#EDE9FE" stroke="#A855F7" stroke-width="2"/>
  <text x="500" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#9333EA">Analytical Projection / Query View</text>
  <text x="500" y="295" text-anchor="middle" font-size="10" fill="#1e293b">@AnalyticsDetails.query = true · Combines cube + dimensions + filters</text>

  <line x1="500" y1="305" x2="500" y2="330" stroke="#E95420" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Consumption -->
  <rect x="120" y="335" width="760" height="40" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="500" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#16A34A">Fiori Analytical List Page / KPI Tile / Analysis for Office</text>
  <text x="500" y="370" text-anchor="middle" font-size="9" fill="#64748B">OData V4 Analytical Service</text>

  <!-- ============ KEY FIGURES vs DIMENSIONS ============ -->
  <rect x="40" y="395" width="920" height="170" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="500" y="418" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Key Figures vs Dimensions</text>
  <line x1="60" y1="425" x2="940" y2="425" stroke="#E2E8F0" stroke-width="1"/>

  <rect x="60" y="438" width="430" height="115" rx="6" fill="#FEFCE8" stroke="#EAB308" stroke-width="1"/>
  <text x="275" y="458" text-anchor="middle" font-size="12" font-weight="bold" fill="#CA8A04">Key Figures (Measures)</text>
  <text x="80" y="480" font-size="10" fill="#1e293b">@Semantics.amount.currencyCode: 'CurrencyCode'</text>
  <text x="80" y="498" font-size="10" fill="#1e293b">@Semantics.quantity.unitOfMeasure: 'UnitCode'</text>
  <text x="80" y="516" font-size="10" fill="#64748B">Aggregatable numeric fields:</text>
  <text x="80" y="534" font-size="10" fill="#64748B">SUM, AVG, MIN, MAX, COUNT</text>
  <text x="80" y="550" font-size="10" fill="#64748B">Example: TotalPrice, BookingFee, FlightPrice</text>

  <rect x="510" y="438" width="430" height="115" rx="6" fill="#E0F2FE" stroke="#3B82F6" stroke-width="1"/>
  <text x="725" y="458" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563EB">Dimensions (Attributes)</text>
  <text x="530" y="480" font-size="10" fill="#1e293b">@AnalyticsDetails.query.filter: { multiplicity: #TO_MANY }</text>
  <text x="530" y="498" font-size="10" fill="#1e293b">@ObjectModel.text.association: '_Text'</text>
  <text x="530" y="516" font-size="10" fill="#64748B">Grouping / filtering fields:</text>
  <text x="530" y="534" font-size="10" fill="#64748B">Drill-down, slice, dice</text>
  <text x="530" y="550" font-size="10" fill="#64748B">Example: AirlineID, CountryCode, Status</text>

  <!-- ============ ANNOTATIONS REFERENCE ============ -->
  <rect x="40" y="580" width="920" height="155" rx="8" fill="#FFF3ED" stroke="#E95420" stroke-width="1"/>
  <text x="500" y="603" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Analytical CDS Annotations — Quick Reference</text>
  <line x1="60" y1="610" x2="940" y2="610" stroke="#E95420" stroke-width="0.5"/>

  <text x="60" y="633" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@Analytics.dataCategory: #CUBE</tspan>  →  View is an analytical cube (facts + dimensions)</text>
  <text x="60" y="653" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@Analytics.dataCategory: #DIMENSION</tspan>  →  View is a dimension (master data / attributes)</text>
  <text x="60" y="673" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@AnalyticsDetails.query: true</tspan>  →  Expose as query (combine cube + dim)</text>
  <text x="60" y="693" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@AnalyticsDetails.query.maxLength</tspan>  →  Max result rows for query (default: 1000)</text>
  <text x="60" y="713" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@Semantics.amount.currencyCode / @Semantics.quantity.unitOfMeasure</tspan>  →  Unit ref</text>
  <text x="60" y="733" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@ObjectModel.text.association</tspan>  →  Text association for dimension (language-dependent)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Ubuntu', sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E95420"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="55" fill="#E95420"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">CDS View Syntax — Complete Breakdown</text>

  <!-- Full code example -->
  <rect x="30" y="70" width="940" height="100" rx="8" fill="#1E293B"/>
  <text x="50" y="90" font-size="10" fill="#94A3B8">@AbapCatalog.sqlViewName: 'ZPRAC_SQL_SIMPLE'                    <tspan fill="#64748B">-- 1. Annotation block</tspan></text>
  <text x="50" y="105" font-size="10" fill="#94A3B8">@AbapCatalog.compiler.compareFilter: true                       <tspan fill="#64748B">-- 2. View metadata</tspan></text>
  <text x="50" y="120" font-size="10" fill="#94A3B8">@AccessControl.authorizationCheck: #CHECK                       <tspan fill="#64748B">-- 3. Access control</tspan></text>
  <text x="50" y="135" font-size="10" fill="#94A3B8">@EndUserText.label: 'Simple Example View'                       <tspan fill="#64748B">-- 4. UI labeling</tspan></text>
  <text x="50" y="155" font-size="10" fill="#22C55E">define view ZPRAC_CDS_SIMPLE                                    <tspan fill="#64748B">-- 5. View definition</tspan></text>
  <text x="50" y="170" font-size="10" fill="#94A3B8">  as select from /dmo/travel                                    <tspan fill="#64748B">-- 6. Data source</tspan></text>

  <!-- Annotations detail -->
  <rect x="30" y="190" width="460" height="160" rx="8" fill="#FFF3ED" stroke="#E95420" stroke-width="1.5"/>
  <text x="50" y="212" font-size="12" font-weight="bold" fill="#E95420">1–4  Annotations (Metadata)</text>
  <line x1="50" y1="218" x2="470" y2="218" stroke="#E95420" stroke-width="0.5"/>

  <text x="50" y="238" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@AbapCatalog.sqlViewName</tspan>  → SQL view name in HANA</text>
  <text x="50" y="256" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@AbapCatalog.compiler.compareFilter</tspan>  → Push filter to source</text>
  <text x="50" y="274" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@AccessControl.authorizationCheck</tspan>  → #CHECK / #NOT_REQ / #PRIVILEGED_ONLY</text>
  <text x="50" y="292" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@EndUserText.label</tspan>  → Display name in Fiori / ADT</text>
  <text x="50" y="310" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#E95420">@Semantics.amount.currencyCode</tspan>  → Currency reference</text>
  <text x="50" y="328" font-size="10" fill="#64748B">@Search.searchable: true  → Enable search (OData)</text>
  <text x="50" y="346" font-size="10" fill="#64748B">@Consumption.* / @UI.*  → Fiori UI annotations</text>

  <!-- View definition detail -->
  <rect x="510" y="190" width="460" height="160" rx="8" fill="#E0F2FE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="530" y="212" font-size="12" font-weight="bold" fill="#2563EB">5–6  View Declaration</text>
  <line x1="530" y1="218" x2="950" y2="218" stroke="#3B82F6" stroke-width="0.5"/>

  <text x="530" y="238" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#2563EB">define view</tspan>  → Keyword declares a CDS view</text>
  <text x="530" y="256" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#2563EB">ZPRAC_CDS_SIMPLE</tspan>  → View name (use naming convention)</text>
  <text x="530" y="274" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#2563EB">as select from</tspan>  → Source = CDS view or DDIC table</text>
  <text x="530" y="292" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#2563EB">/dmo/travel</tspan>  → Fully qualified entity name</text>
  <text x="530" y="310" font-size="10" fill="#64748B">You can also use: alias (as _Alias)</text>
  <text x="530" y="328" font-size="10" fill="#64748B">Projection: use define view entity</text>
  <text x="530" y="346" font-size="10" fill="#64748B">Parameters: (param: type) after view name</text>

  <!-- Field list -->
  <rect x="30" y="370" width="940" height="120" rx="8" fill="#1E293B"/>
  <text x="50" y="392" font-size="10" fill="#94A3B8">{                                                <tspan fill="#64748B">-- 7. Field list opens</tspan></text>
  <text x="70" y="410" font-size="10" fill="#EAB308">  key travel_id          as TravelId,            <tspan fill="#64748B">-- 8. Key element</tspan></text>
  <text x="70" y="428" font-size="10" fill="#94A3B8">      agency_id          as AgencyId,</text>
  <text x="70" y="446" font-size="10" fill="#94A3B8">      customer_id        as CustomerId,</text>
  <text x="70" y="464" font-size="10" fill="#94A3B8">      total_price         as TotalPrice,</text>
  <text x="70" y="482" font-size="10" fill="#3B82F6">      @Semantics.amount.currencyCode: 'CurrencyCode'  <tspan fill="#64748B">-- 9. Field-level annotation</tspan></text>
  <text x="70" y="500" font-size="10" fill="#94A3B8">      booking_fee        as BookingFee</text>
  <text x="50" y="520" font-size="10" fill="#94A3B8">}                                                <tspan fill="#64748B">-- 10. Field list closes</tspan></text>

  <!-- Field list explanation -->
  <rect x="30" y="505" width="940" height="100" rx="8" fill="#FEFCE8" stroke="#EAB308" stroke-width="1.5"/>
  <text x="50" y="527" font-size="12" font-weight="bold" fill="#CA8A04">7–10  Field Selection List</text>
  <line x1="50" y1="533" x2="950" y2="533" stroke="#EAB308" stroke-width="0.5"/>

  <text x="50" y="553" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#EAB308">7.</tspan> <tspan font-weight="bold">{ }</tspan>  → Curly braces enclose the selected elements</text>
  <text x="50" y="571" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#EAB308">8.</tspan> <tspan font-weight="bold">key</tspan>  → Marks primary key (CAN be omitted for views based on other views)</text>
  <text x="50" y="589" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#EAB308">9.</tspan> <tspan font-weight="bold">as</tspan>  → Alias for the output field name (recommended: CamelCase)</text>
  <text x="50" y="607" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#EAB308">10.</tspan> Field-level annotations  → @Semantics, @UI, @Consumption placed BEFORE the field</text>

  <!-- Association + filter section -->
  <rect x="30" y="625" width="940" height="100" rx="8" fill="#EDE9FE" stroke="#A855F7" stroke-width="1.5"/>
  <text x="50" y="647" font-size="12" font-weight="bold" fill="#9333EA">Extended Syntax — Associations, Joins, Filters, Parameters</text>
  <line x1="50" y1="653" x2="950" y2="653" stroke="#A855F7" stroke-width="0.5"/>

  <text x="50" y="673" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#A855F7">association</tspan> [0..1] to /dmo/agency as _Agency on $projection.AgencyId = _Agency.agency_id</text>
  <text x="50" y="693" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#A855F7">inner / left outer / right outer / cross join</tspan>  → Join other entities in SELECT</text>
  <text x="50" y="713" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#A855F7">where</tspan> Status = 'A'  → Filter condition (can use params: $parameters.param_name)</text>
  <text x="50" y="733" font-size="10" fill="#1e293b"><tspan font-weight="bold" fill="#A855F7">with parameters</tspan> (p_carrid: /dmo/carrier-carrier_id)  → Input parameters before SELECT</text>
</svg>
